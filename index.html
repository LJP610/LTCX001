<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修理厂轮胎存放管理系统</title>
  <link rel="stylesheet" href="lt2.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="top-banner">
    <div class="banner-inner">
      <i class="fa-solid fa-warehouse"></i>
      <h1>修理厂轮胎存放管理系统</h1>
      <p>车牌号查询 · 新增记录 · 多设备同步</p>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-item active" onclick="showTab('search')">
      <i class="fa-solid fa-magnifying-glass"></i> 车牌号查询
    </button>
    <button class="nav-item" onclick="showTab('list')">
      <i class="fa-solid fa-list-ul"></i> 全部记录
    </button>
    <button class="nav-item" onclick="showTab('add')">
      <i class="fa-solid fa-plus-circle"></i> 新增客户
    </button>
  </div>

  <div class="main-container">
    <!-- 查询页 -->
    <div id="searchTab" class="tab active">
      <div class="card">
        <div class="card-title">
          <i class="fa-solid fa-search"></i> 快速查询
        </div>
        <div class="search-bar">
          <input type="text" id="carInput" placeholder="输入车牌号，如：京A12345">
          <button onclick="searchCar()">查询</button>
        </div>
        <div id="resultArea" class="result-box">
          <div class="empty-tip">
            <i class="fa-solid fa-file-text"></i>
            <p>请输入车牌号进行查询</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 全部记录 -->
    <div id="listTab" class="tab">
      <div class="card">
        <div class="card-title">
          <i class="fa-solid fa-database"></i> 全部轮胎记录
        </div>
        <div class="sync-btns">
          <button onclick="exportData()" class="btn-export">
            <i class="fa-solid fa-download"></i> 导出数据
          </button>
          <label class="btn-import">
            <i class="fa-solid fa-upload"></i> 导入数据
            <input type="file" accept=".json" onchange="importData(event)" hidden>
          </label>
        </div>
        <div id="tireList" class="list-box"></div>
      </div>
    </div>

    <!-- 新增 -->
    <div id="addTab" class="tab">
      <div class="card">
        <div class="card-title">
          <i class="fa-solid fa-user-plus"></i> 新增存放记录
        </div>
        <div class="form-group">
          <label>车牌号</label>
          <input type="text" id="addCarNo" placeholder="例如：京A12345">
        </div>
        <div class="form-group">
          <label>客户姓名</label>
          <input type="text" id="addCustomer" placeholder="请输入客户姓名">
        </div>
        <div class="form-group">
          <label>轮胎规格</label>
          <input type="text" id="addTireSpec" placeholder="例如：205/55R16">
        </div>
        <div class="form-group">
          <label>存放位置</label>
          <input type="text" id="addLocation" placeholder="例如：A区05号柜">
        </div>
        <button class="btn-save" onclick="addTireRecord()">保存记录</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>© 修理厂专用管理系统 · 数据安全可同步</p>
  </div>

  <script src="lt3.js"></script>
</body>
</html>
