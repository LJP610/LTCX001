<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>轮胎存放管理系统</title>
  <link rel="stylesheet" href="lt2.css">
</head>
<body>
  <div class="top-banner">
    <div class="banner-inner">
      <h1>轮胎存放管理系统</h1>
      <p>记录 · 查询 · 管理 · 云同步</p>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-item active" data-tab="list">记录列表</button>
    <button class="nav-item" data-tab="add">添加记录</button>
    <button class="nav-item" data-tab="search">高级查询</button>
  </div>

  <div class="main-container">
    <!-- 记录列表页 -->
    <div class="tab active" id="list">
      <div class="card">
        <div class="card-title">记录列表</div>
        <div class="search-bar">
          <input type="text" id="searchAll" placeholder="搜索车牌号/手机后四位/客户姓名">
        </div>
        <div class="list-box" id="listContainer"></div>
      </div>
    </div>

    <!-- 添加记录页 -->
    <div class="tab" id="add">
      <div class="card">
        <div class="card-title">添加轮胎记录</div>
        <div class="form-group">
          <label>车牌号</label>
          <input type="text" id="carNo">
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input type="text" id="phone">
        </div>
        <div class="form-group">
          <label>客户姓名</label>
          <input type="text" id="customer">
        </div>
        <div class="form-group">
          <label>轮胎规格</label>
          <input type="text" id="tireSpec">
        </div>
        <div class="form-group">
          <label>存放位置</label>
          <input type="text" id="location">
        </div>
        <button class="btn-save" id="saveBtn">保存记录</button>
      </div>
    </div>

    <!-- 高级查询页 -->
    <div class="tab" id="search">
      <div class="card">
        <div class="card-title">高级查询</div>
        <div class="form-group">
          <label>车牌号后四位</label>
          <input type="text" id="q_car">
        </div>
        <div class="form-group">
          <label>手机号后四位</label>
          <input type="text" id="q_phone">
        </div>
        <div class="form-group">
          <label>客户姓名</label>
          <input type="text" id="q_name">
        </div>
        <button class="btn-save" id="searchBtn">查询</button>
        <div class="result-box" id="searchResult"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    轮胎管理系统 © 云存储版
  </div>

  <!-- 先引入Supabase库，再引入自己的JS，顺序不能变 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lt3.js"></script>
</body>
</html>
